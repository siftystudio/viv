name: CD — Viv JetBrains Plugin

on:
  push:
    tags:
      - "jetbrains-v*"

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#jetbrains-v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must be on main"
            exit 1
          fi

      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: ci
          repo-token: ${{ github.token }}
          wait-interval: 15

      - name: Verify version matches gradle.properties
        run: |
          props_version=$(grep '^pluginVersion' plugins/jetbrains/gradle.properties | cut -d= -f2 | tr -d ' ')
          if [ "$props_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match gradle.properties ($props_version)"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          body=$(scripts/extract-changelog.sh "$version" plugins/jetbrains/CHANGELOG.md)
          echo "body<<CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "[Install latest from Marketplace](https://plugins.jetbrains.com/plugin/31012-viv) · [Install v${version} from GitHub](https://github.com/siftystudio/viv/blob/main/plugins/jetbrains/README.md#installing-a-specific-release) · [README](https://github.com/siftystudio/viv/blob/main/plugins/jetbrains/README.md)" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build plugin
        working-directory: plugins/jetbrains
        run: ./gradlew buildPlugin

      - name: Verify plugin
        working-directory: plugins/jetbrains
        run: ./gradlew verifyPlugin

      - name: Sign plugin
        working-directory: plugins/jetbrains
        run: ./gradlew signPlugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}

      - name: Publish to JetBrains Marketplace
        working-directory: plugins/jetbrains
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PAT }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Viv JetBrains Plugin v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: plugins/jetbrains/build/distributions/*.zip
