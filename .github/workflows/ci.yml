name: CI

on:
  push:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install compiler
        run: pip install poetry && cd compiler && poetry config virtualenvs.in-project true && poetry install

      - name: Check lock file
        run: cd compiler && poetry check --lock

      - name: Run tests
        run: cd compiler && poetry run pytest

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install compiler
        run: pip install compiler/

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm --workspace runtimes/js run build:compile

      - name: Check API surface
        run: npm --workspace runtimes/js run check:api

      - name: Run tests
        run: npm --workspace runtimes/js test

      - name: Build
        run: npm --workspace runtimes/js run build

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run TextMate grammar tests
        run: npm --workspace syntax test

      - name: Run Sublime syntax tests
        uses: SublimeText/syntax-test-action@v2
        with:
          build: latest
          package_root: plugins/sublime
          package_name: Viv

  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync checks
        run: python scripts/run_sync_checks.py

  examples:
    needs: [compiler, runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install compiler
        run: pip install compiler/

      - name: Install runtime dependencies
        run: npm ci

      - name: Compile example bundles
        run: |
          vivc -q -i examples/hello-viv-ts/src/content/source.viv -o examples/hello-viv-ts/src/content/compiled_content_bundle.json
          vivc -q -i examples/hello-viv-js/src/content/source.viv -o examples/hello-viv-js/src/content/compiled_content_bundle.json

      - name: Build runtime
        run: npm --workspace runtimes/js run build

      - name: Run hello-viv-ts
        run: npm --workspace examples/hello-viv-ts run start

      - name: Run hello-viv-js
        run: npm --workspace examples/hello-viv-js run start

  jetbrains:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build and test
        run: ./gradlew buildPlugin test

  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install compiler
        run: pip install compiler/

      - name: Run Claude Code plugin tests (bash 5.x, Linux default)
        run: bash plugins/claude/tests/run-tests.sh

      - name: Cache bash 3.2.57 build
        id: cache-bash3
        uses: actions/cache@v4
        with:
          path: /tmp/bash3
          key: bash-3.2.57-${{ runner.os }}

      - name: Build bash 3.2.57 (matches macOS default; cached after first run)
        if: steps.cache-bash3.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -sSLO https://ftp.gnu.org/gnu/bash/bash-3.2.57.tar.gz
          tar xzf bash-3.2.57.tar.gz
          cd bash-3.2.57
          ./configure --prefix=/tmp/bash3 CFLAGS="-Wno-implicit-function-declaration -Wno-error"
          make -j"$(nproc)"
          make install

      - name: Run Claude Code plugin tests (bash 3.2.57, macOS default)
        run: /tmp/bash3/bin/bash plugins/claude/tests/run-tests.sh

  ci:
    needs: [compiler, runtime, syntax, sync, jetbrains, claude, examples]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"

  docs:
    if: github.ref == 'refs/heads/main'
    needs: ci
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: cd docs && npm run build

      - name: Restore API docs from last runtime release
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: cd-runtime.yml
          name: js-runtime-api-docs
          path: docs/reference/runtimes/js
          if_no_artifact_found: warn

      - name: Assemble site
        run: |
          if [ -d docs/reference/runtimes/js ]; then
            mkdir -p docs/dist/reference/runtimes/js
            cp -r docs/reference/runtimes/js/* docs/dist/reference/runtimes/js/
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
