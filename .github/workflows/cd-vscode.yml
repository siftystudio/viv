name: CD — Viv VS Code Extension

on:
  push:
    tags:
      - "vscode-v*"

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#vscode-v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must be on main"
            exit 1
          fi

      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: ci
          repo-token: ${{ github.token }}
          wait-interval: 15

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify version matches package.json
        run: |
          pkg_version=$(node -e "console.log(require('./plugins/vscode/package.json').version)")
          if [ "$pkg_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match package.json ($pkg_version)"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          body=$(scripts/extract-changelog.sh "${{ steps.version.outputs.version }}" plugins/vscode/CHANGELOG.md)
          echo "body<<CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Install extension dependencies
        run: cd plugins/vscode && npm ci

      - name: Package extension
        run: |
          cd plugins/vscode
          npm run vscode:prepublish
          vsce package -o viv.vsix

      - name: Publish to VS Code Marketplace
        run: |
          cd plugins/vscode
          vsce publish --packagePath viv.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Viv VS Code Extension v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: plugins/vscode/viv.vsix
