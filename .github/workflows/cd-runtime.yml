name: CD — Viv Runtime (npm)

on:
  push:
    tags:
      - "runtime-v*"

permissions:
  contents: write
  actions: read
  checks: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#runtime-v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must be on main"
            exit 1
          fi

      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: ci
          repo-token: ${{ github.token }}
          wait-interval: 15

      - name: Verify version matches package.json
        run: |
          pkg_version=$(node -e "console.log(require('./runtimes/js/package.json').version)")
          if [ "$pkg_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match package.json ($pkg_version)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install runtime dependencies
        run: npm ci

      - name: Build runtime
        run: npm --workspace runtimes/js run build

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          body=$(scripts/extract-changelog.sh "$version" runtimes/js/CHANGELOG.md)
          echo "body<<CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "[Install latest from npm](https://www.npmjs.com/package/@siftystudio/viv-runtime) · [Install v${version} from npm](https://www.npmjs.com/package/@siftystudio/viv-runtime/v/${version}) · [README](https://github.com/siftystudio/viv/blob/main/runtimes/js/README.md) · [API Reference](https://viv.sifty.studio/reference/runtimes/js/)" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm --workspace runtimes/js publish --ignore-scripts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Viv JavaScript Runtime v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}

      - name: Generate API docs
        run: npm --workspace runtimes/js run docs

      - name: Upload API docs for CI use
        uses: actions/upload-artifact@v4
        with:
          name: js-runtime-api-docs
          path: docs/reference/runtimes/js
          retention-days: 400

      - name: Build language reference
        run: cd docs && npm run build

      - name: Assemble site
        run: |
          if [ -d docs/reference/runtimes/js ]; then
            mkdir -p docs/dist/reference/runtimes/js
            cp -r docs/reference/runtimes/js/* docs/dist/reference/runtimes/js/
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  docs:
    needs: publish
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
