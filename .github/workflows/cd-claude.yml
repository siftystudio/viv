name: CD — Viv Claude Code Plugin

on:
  push:
    tags:
      - "claude-v*"

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#claude-v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must be on main"
            exit 1
          fi

      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: ci
          repo-token: ${{ github.token }}
          wait-interval: 15

      - name: Verify version matches plugin.json
        run: |
          pkg_version=$(python3 -c "import json; print(json.load(open('plugins/claude/.claude-plugin/plugin.json'))['version'])")
          if [ "$pkg_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match plugin.json ($pkg_version)"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          body=$(scripts/extract-changelog.sh "$version" plugins/claude/CHANGELOG.md)
          echo "body<<CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "[Install latest from GitHub](https://github.com/siftystudio/viv/blob/main/plugins/claude/README.md#getting-started) · [Install v${version} from GitHub](https://github.com/siftystudio/viv/releases/tag/claude-v${version}) · [README](https://github.com/siftystudio/viv/blob/main/plugins/claude/README.md)" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_BODY_DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          # Create marketplace wrapper structure
          version="${{ steps.version.outputs.version }}"
          staging="viv-claude-v${version}"
          mkdir -p "${staging}/.claude-plugin" "${staging}/viv"
          # Download our actual marketplace.json, then patch its 'source' to
          # point at the bundled plugin directory inside the zip.
          curl -sfL "https://raw.githubusercontent.com/siftystudio/claude-plugins/main/.claude-plugin/marketplace.json" \
            -o marketplace-raw.json
          jq '.plugins[0].source = "./viv"' \
            marketplace-raw.json > "${staging}/.claude-plugin/marketplace.json"
          # Copy plugin files into viv/ subdirectory
          cp -r plugins/claude/.claude-plugin "${staging}/viv/"
          cp -r plugins/claude/bin "${staging}/viv/"
          cp -r plugins/claude/docs "${staging}/viv/"
          cp -r plugins/claude/hooks "${staging}/viv/"
          cp -r plugins/claude/skills "${staging}/viv/"
          cp plugins/claude/LICENSE.txt "${staging}/viv/"
          cp plugins/claude/PRIVACY.md "${staging}/viv/"
          cp plugins/claude/README.md "${staging}/viv/"
          cp plugins/claude/CHANGELOG.md "${staging}/viv/"
          # Zip it up
          zip -r "${staging}.zip" "${staging}/"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Viv Claude Code Plugin v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: viv-claude-v${{ steps.version.outputs.version }}.zip
